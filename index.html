<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VÉRA Atelier</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0b0b0b;
color:white;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.page{
display:none;
}

.active{
display:block;
}

.box{
width:360px;
padding:40px;
background:rgba(0,0,0,0.6);
border-radius:16px;
backdrop-filter:blur(20px);
text-align:center;
}

.brand{
font-family:'Playfair Display',serif;
font-size:32px;
margin-bottom:20px;
letter-spacing:2px;
}

input{
width:100%;
padding:14px;
margin-bottom:16px;
background:transparent;
border:1px solid rgba(255,255,255,0.3);
border-radius:8px;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:30px;
background:white;
color:black;
font-weight:600;
cursor:pointer;
margin-top:5px;
}

.link{
margin-top:15px;
font-size:13px;
opacity:0.8;
cursor:pointer;
}

.dashboard{
text-align:center;
}

.logout{
margin-top:30px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="page active">
<div class="box">

<div class="brand">VÉRA</div>

<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="showDashboard()">Sign In</button>

<div class="link" onclick="showSignup()">Create Account</div>

</div>
</div>


<!-- SIGNUP PAGE -->

<div id="signupPage" class="page">
<div class="box">

<div class="brand">VÉRA</div>

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="showDashboard()">Sign Up</button>

<div class="link" onclick="showLogin()">Back to Login</div>

</div>
</div>


<!-- DASHBOARD PAGE -->

<div id="dashboardPage" class="page">
<div class="box dashboard">

<div class="brand">VÉRA</div>

<h2>Welcome to VÉRA Atelier</h2>
<p style="margin-top:10px; opacity:0.7;">
Luxury Fashion Dashboard
</p>

<button class="logout" onclick="showLogin()">Logout</button>

</div>
</div>


<script>

function hideAll(){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
}

function showLogin(){
hideAll()
document.getElementById("loginPage").classList.add("active")
}

function showSignup(){
hideAll()
document.getElementById("signupPage").classList.add("active")
}

function showDashboard(){
hideAll()
document.getElementById("dashboardPage").classList.add("active")
}

</script>

</body>
</html>
