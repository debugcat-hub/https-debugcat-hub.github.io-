<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VÉRA Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0b0b0b;
color:white;
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:220px;
background:#111;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.brand{
font-family:'Playfair Display',serif;
font-size:26px;
margin-bottom:40px;
letter-spacing:2px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu button{
background:none;
border:none;
color:white;
text-align:left;
padding:10px;
cursor:pointer;
border-radius:6px;
}

.menu button:hover{
background:#1e1e1e;
}

/* Main area */

.main{
flex:1;
padding:40px;
}

.page{
display:none;
}

.active{
display:block;
}

.card{
background:#151515;
padding:25px;
border-radius:12px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="brand">VÉRA</div>

<div class="menu">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('products')">Products</button>
<button onclick="showPage('orders')">Orders</button>
<button onclick="showPage('profile')">Profile</button>
</div>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<!-- HOME -->

<div id="home" class="page active">
<h1>Dashboard</h1>

<div class="card">
<h3>Welcome to VÉRA Atelier</h3>
<p style="opacity:0.7;margin-top:10px;">
Luxury fashion management dashboard.
</p>
</div>
</div>

<!-- PRODUCTS -->

<div id="products" class="page">
<h1>Products</h1>

<div class="card">
<p>Manage your fashion collections here.</p>
</div>

</div>

<!-- ORDERS -->

<div id="orders" class="page">
<h1>Orders</h1>

<div class="card">
<p>Customer orders will appear here.</p>
</div>

</div>

<!-- PROFILE -->

<div id="profile" class="page">
<h1>Profile</h1>

<div class="card">
<p>User settings and account details.</p>
</div>

</div>

</div>

<script>

function showPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

}

</script>

</body>
</html>
