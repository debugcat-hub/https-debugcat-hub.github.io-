<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VÉRA — Fashion Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <!-- Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #0b0b0b;
      color: white;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .login-container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      width: 360px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      text-align: center;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 30px;
      background: white;
      color: black;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #e6e6e6;
      transform: translateY(-2px);
    }

    .footer-text {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="login-container">
  <div class="login-box">
    <div class="brand">VÉRA</div>
    <div class="subtitle">Luxury Fashion Access</div>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Sign In</button>

    <div class="footer-text">
      © 2026 VÉRA Atelier
    </div>
  </div>
</div>

<script>
  // THREE.JS SCENE
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.z = 6;

  const renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById('bg'),
    alpha: true
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);

  // Geometry (fashion-like abstract form)
  const geometry = new THREE.TorusKnotGeometry(1.5, 0.4, 120, 16);
  const material = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    metalness: 0.7,
    roughness: 0.2
  });
  const knot = new THREE.Mesh(geometry, material);
  scene.add(knot);

  // Lighting
  const light1 = new THREE.PointLight(0xffffff, 1);
  light1.position.set(5, 5, 5);
  scene.add(light1);

  const light2 = new THREE.PointLight(0xffffff, 0.5);
  light2.position.set(-5, -5, -5);
  scene.add(light2);

  function animate() {
    requestAnimationFrame(animate);
    knot.rotation.x += 0.002;
    knot.rotation.y += 0.003;
    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
